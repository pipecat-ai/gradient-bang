[project]
name = "gradient-bang-byoa-runtime"
version = "0.0.0"
description = "Bring-Your-Own-Agent harness for Gradient Bang."
license = { file = "LICENSE" }
requires-python = ">=3.12"
dependencies = [
    # Pipecat core + the four Mode-A LLM providers (minimax piggy-backs on
    # the OpenAI service via base_url so no separate extra is needed).
    "pipecat-ai[google,anthropic,openai,runner]>=1.0",
    "pipecat-ai-subagents[pgmq]>=0.5.0",
    "loguru>=0.7.0",
    "python-dotenv>=1.1.1",
    "httpx>=0.27.0",
]

[project.scripts]
byoa = "gradientbang.byoa.app:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"gradientbang.prompts" = ["**/*.md"]

[tool.uv]
# Mirror the openai pin from the bot's pyproject so the LLM-factory paths
# behave identically across the bot and BYOA runtimes.
override-dependencies = ["openai==1.99.5"]

[tool.uv.sources]
# Pinned to PR #24 (PgmqBus pluggable backends) until merged + released.
# Mirror this with pyproject.toml.
pipecat-ai-subagents = { git = "https://github.com/pipecat-ai/pipecat-subagents", rev = "87b25eaab0d546f35490719c6bc3cd967feedc4b" }

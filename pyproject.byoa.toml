[build-system]
# Required: without this, uv defaults to its own `uv_build` backend, which
# ignores `[tool.setuptools]` below and expects src/<normalized_name>/ —
# i.e. src/gradient_bang_byoa_runtime/. Our source lives at src/gradientbang/,
# so the default backend silently installs an empty package and the `byoa`
# entry script never gets written into .venv/bin/.
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "gradient-bang-byoa-runtime"
version = "0.0.0"
description = "Bring-Your-Own-Agent harness for Gradient Bang."
license = { file = "LICENSE" }
requires-python = ">=3.12"
dependencies = [
    # Pipecat core + BYOA bus + the Mode-A LLM providers. MiniMax piggy-backs
    # on the OpenAI service via base_url, so no separate extra is needed.
    "pipecat-ai[google,anthropic,runner,pgmq]>=1.3",
    "loguru>=0.7.0",
    "python-dotenv>=1.1.1",
    "pydantic-settings>=2,<3",
    "httpx>=0.27.0",
]

[project.scripts]
byoa = "gradientbang.runtime.byoa.app:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"gradientbang.prompts" = ["**/*.md"]

[tool.uv]
# Mirror the openai pin from the bot's pyproject so the LLM-factory paths
# behave identically across the bot and BYOA runtimes.
override-dependencies = ["openai==1.99.5"]

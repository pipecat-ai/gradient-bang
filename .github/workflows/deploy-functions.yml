name: Deploy Edge Functions

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - eval
  push:
    branches: [dev]
    paths:
      - "deployment/supabase/functions/**"

jobs:
  deploy:
    name: Deploy to Supabase (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref $SUPABASE_PROJECT_REF --workdir deployment --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ (inputs.environment == 'eval') && secrets.SUPABASE_PROJECT_REF_EVAL || secrets.SUPABASE_PROJECT_REF }}
